name: Move Trello Card on Push and Merge

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - closed
    branches:
      - main

jobs:
  move-card:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Fetch first card from Review list (on push)
        if: github.event_name == 'push'
        run: |
          RESPONSE=$(curl -s "https://api.trello.com/1/lists/${{ secrets.TRELLO_LIST_REVIEW }}/cards?key=${{ secrets.TRELLO_KEY }}&token=${{ secrets.TRELLO_TOKEN }}")
          CARD_ID=$(echo "$RESPONSE" | jq -r '.[0].id')
          if [ -z "$CARD_ID" ]; then
            echo "No card found in Review list. Skipping."
            exit 0
          fi
          echo "CARD_ID=$CARD_ID" >> $GITHUB_ENV

      - name: Fetch first card from Review list (on PR merged)
        if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
        run: |
          RESPONSE=$(curl -s "https://api.trello.com/1/lists/${{ secrets.TRELLO_LIST_REVIEW }}/cards?key=${{ secrets.TRELLO_KEY }}&token=${{ secrets.TRELLO_TOKEN }}")
          CARD_ID=$(echo "$RESPONSE" | jq -r '.[0].id')
          if [ -z "$CARD_ID" ]; then
            echo "No card found in Review list. Skipping."
            exit 0
          fi
          echo "CARD_ID=$CARD_ID" >> $GITHUB_ENV

      - name: Move card to target list
        if: env.CARD_ID != ''
        run: |
          if [[ "${{ github.event_name }}" == "push" ]]; then
            TARGET_LIST="${{ secrets.TRELLO_LIST_REVIEW }}"
          elif [[ "${{ github.event_name }}" == "pull_request" ]] && [[ "${{ github.event.pull_request.merged }}" == "true" ]]; then
            TARGET_LIST="${{ secrets.TRELLO_LIST_DONE }}"
          else
            echo "No action needed."
            exit 0
          fi

          echo "Moving card $CARD_ID to $TARGET_LIST..."
          curl -X PUT "https://api.trello.com/1/cards/$CARD_ID" \
            --data "key=${{ secrets.TRELLO_KEY }}" \
            --data "token=${{ secrets.TRELLO_TOKEN }}" \
            --data "idList=$TARGET_LIST"
          echo "Card moved successfully!"
