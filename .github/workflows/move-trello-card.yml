cat > .github/workflows/move-trello-card.yml << 'EOF'
name: Move Trello Card

on:
  pull_request:
    types: [opened, closed]
    branches: [main]

jobs:
  move-card:
    runs-on: ubuntu-latest

    steps:
      - name: Extract ticket from PR title
        run: |
          TITLE="${{ github.event.pull_request.title }}"
          TICKET=$(echo "$TITLE" | grep -oE 'TRELLO-[0-9]+')
          echo "TICKET=$TICKET" >> $GITHUB_ENV

      - name: Fetch cards from Trello TODO list
        run: |
