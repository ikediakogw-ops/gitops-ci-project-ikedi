name: CI Pipeline

on:
  push:
    branches: [ "main", "feature/**" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Lint
      run: |
        flake8 app.py test_app.py

    - name: Run Tests
      run: |
        pytest test_app.py -v

    # 🔥 THIS IS THE MAGIC (TRELLO UPDATE)
    - name: Update Trello Card on Success
      if: success()
      run: |
        curl -X PUT "https://api.trello.com/1/cards/${{ secrets.TRELLO_CARD_ID }}" \
        --data "key=${{ secrets.TRELLO_KEY }}&token=${{ secrets.TRELLO_TOKEN }}&name=CI Passed - $(date)"
