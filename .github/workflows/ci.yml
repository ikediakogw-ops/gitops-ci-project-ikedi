name: Move Trello Card

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - closed
    branches:
      - main

jobs:
  move-card:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Extract Trello Label
        id: extract_label
        shell: bash
        run: |
          echo "Event: $GITHUB_EVENT_NAME"

          if [ "$GITHUB_EVENT_NAME" == "pull_request" ]; then
            TEXT="${{ github.event.pull_request.title }}"
            BRANCH="${{ github.head_ref }}"
          else
            TEXT="$GITHUB_REF_NAME"
            BRANCH="$GITHUB_REF_NAME"
          fi

          echo "Branch: $BRANCH"
          echo "Text to search: $TEXT"

          CARD_LABEL=$(echo "$TEXT" | grep -oE 'TRELLO-[0-9]+' || true)

          if [ -z "$CARD_LABEL" ]; then
            echo "No Trello label found. Skipping."
            exit 0
          fi

          echo "Found label: $CARD_LABEL"
          echo "CARD_LABEL=$CARD_LABEL" >> $GITHUB_ENV

      - name: Fetch Trello Card ID
        if: env.CARD_LABEL != ''
        id: get_card
        shell: bash
        run: |
          echo "Fetching cards from board..."

          RESPONSE=$(curl -s "https://api.trello.com/1/boards/${TRELLO_BOARD_ID}/cards?key=${TRELLO_KEY}&token=${TRELLO_TOKEN}")

          echo "Sample cards:"
          echo "$RESPONSE" | jq '.[0:3]'

          CARD_ID=$(echo "$RESPONSE" | jq -r --arg LABEL "$CARD_LABEL" '
            .[]
            | select(
                (.name | test($LABEL))
                or
                (.labels[]?.name == $LABEL)
              )
            | .id
          ' | head -n 1)

          if [ -z "$CARD_ID" ]; then
            echo "No matching Trello card found."
            exit 0
          fi

          echo "Found CARD_ID: $CARD_ID"
          echo "CARD_ID=$CARD_ID" >> $GITHUB_ENV

        env:
          TRELLO_KEY: ${{ secrets.TRELLO_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
          TRELLO_BOARD_ID: ${{ secrets.TRELLO_BOARD_ID }}

      - name: Move Trello Card
        if: env.CARD_ID != ''
        shell: bash
        run: |
          echo "Deciding target list..."

          if [[ "$GITHUB_EVENT_NAME" == "push" ]]; then
            TARGET_LIST="${{ secrets.TRELLO_LIST_REVIEW }}"
            echo "Push detected → Move to REVIEW"
          elif [[ "$GITHUB_EVENT_NAME" == "pull_request" && "${{ github.event.pull_request.merged }}" == "true" ]]; then
            TARGET_LIST="${{ secrets.TRELLO_LIST_DONE }}"
            echo "PR merged → Move to DONE"
          else
            echo "No action needed."
            exit 0
          fi

          echo "Moving card $CARD_ID to list $TARGET_LIST..."

          curl -X PUT "https://api.trello.com/1/cards/$CARD_ID" \
            --data "key=${{ secrets.TRELLO_KEY }}" \
            --data "token=${{ secrets.TRELLO_TOKEN }}" \
            --data "idList=$TARGET_LIST"

          echo "Card moved successfully!"