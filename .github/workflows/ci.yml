name: Trello Card Automation

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, closed]

jobs:
  trello:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Extract Trello ID
        shell: bash
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" ]]; then
            TEXT="${{ github.event.pull_request.title }}"
          else
            TEXT="$GITHUB_REF_NAME"
          fi

          CARD_LABEL=$(echo "$TEXT" | grep -oE 'TRELLO-[0-9]+' || true)

          if [[ -z "$CARD_LABEL" ]]; then
            echo "No Trello ID found"
            exit 0
          fi

          echo "CARD_LABEL=$CARD_LABEL" >> $GITHUB_ENV

      - name: Get Card ID
        if: env.CARD_LABEL != ''
        shell: bash
        run: |
         CARD_ID=$(curl -s "https://api.trello.com/1/boards/${TRELLO_BOARD_ID}/cards?key=${TRELLO_KEY}&token=${TRELLO_TOKEN}" \
  | jq -r --arg LABEL "$CARD_LABEL" '
    .[]
    | select((.name | contains($LABEL)) or (.labels[]?.name == $LABEL))
    | .id
  ' | head -n 1)

          if [[ -z "$CARD_ID" ]]; then
            echo "No matching card"
            exit 0
          fi

          echo "CARD_ID=$CARD_ID" >> $GITHUB_ENV

        env:
          TRELLO_KEY: ${{ secrets.TRELLO_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
          TRELLO_BOARD_ID: ${{ secrets.TRELLO_BOARD_ID }}

      - name: Move Card
        if: env.CARD_ID != ''
        shell: bash
        run: |
          if [[ "$GITHUB_EVENT_NAME" == "pull_request" && "${{ github.event.pull_request.merged }}" == "true" ]]; then
            TARGET_LIST="${{ secrets.TRELLO_LIST_DONE }}"
            echo "Moving to DONE"
          else
            TARGET_LIST="${{ secrets.TRELLO_LIST_REVIEW }}"
            echo "Moving to REVIEW"
          fi

          curl -s -X PUT "https://api.trello.com/1/cards/$CARD_ID" \
            --data "key=${{ secrets.TRELLO_KEY }}" \
            --data "token=${{ secrets.TRELLO_TOKEN }}" \
            --data "idList=$TARGET_LIST"

          echo "Card moved successfully!"